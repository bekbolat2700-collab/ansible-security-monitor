apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-monitor-role
  namespace: security-monitor
  labels:
    app: security-monitor
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
