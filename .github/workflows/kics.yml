name: KICS Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  kics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run KICS scan
        uses: checkmarx/kics-github-action@v2.1.3
        with:
          path: .
          fail_on: high
          output_path: kics-results/
          output_formats: sarif,json
