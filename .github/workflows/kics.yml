name: KICS Security Scan

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - '**.md'
  pull_request:
  workflow_dispatch:

jobs:
  kics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run KICS scan via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            checkmarx/kics:latest scan \
            -p /path \
            --report-formats json,sarif \
            -o /path/kics-results \
            --fail-on HIGH
