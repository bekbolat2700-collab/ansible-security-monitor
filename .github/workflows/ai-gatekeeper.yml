name: AI Security Gatekeeper

on:
  push:
    branches: [main, master]

jobs:
  security-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Create k3d cluster
        run: |
          k3d cluster create devsecops --wait
          kubectl get nodes

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: |
          trivy fs . --severity HIGH,CRITICAL --format json -o trivy-report.json
          cat trivy-report.json

      - name: AI Security Decision
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          pip install requests python-dotenv 
          python3 -c "
import os
print('TOKEN set:', bool(os.getenv('TELEGRAM_BOT_TOKEN')))
print('CHAT_ID:', os.getenv('TELEGRAM_CHAT_ID'))
"
          python3 ai_security_advisor.py
