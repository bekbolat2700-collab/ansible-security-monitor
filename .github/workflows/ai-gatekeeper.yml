name: AI Security Gatekeeper
on:
  push:
    branches: [main, master]

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t security-monitor:latest .
          docker images | grep security-monitor

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: |
          trivy fs . --severity HIGH,CRITICAL --format json -o trivy-report.json
          echo "Trivy done"

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Run tfsec scan
        run: |
          tfsec terraform/ --format text 2>&1 | tee tfsec-output.txt || true
          echo "tfsec done"

      - name: Run KICS scan
        run: |
          mkdir -p kics-results
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            checkmarx/kics:latest scan \
            -p /path \
            --report-formats json \
            -o /path/kics-results \
            --ignore-on-exit results || true
          echo "KICS done"

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Render Helm templates
        run: |
          helm template k8s/helm/security-monitor > rendered-helm.yaml

      - name: Run Conftest (Policy as Code)
        run: |
          conftest test --policy policy/ k8s/deployment/deployment.yaml rendered-helm.yaml
      - name: Install Python deps
        run: pip install requests python-dotenv

      - name: AI Security Decision + Unified Report
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          export TFSEC_OUTPUT=$(cat tfsec-output.txt 2>/dev/null || echo "")
          python3 ai_security_advisor.py

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Create k3d cluster
        run: |
          k3d cluster create devsecops --wait
          kubectl get nodes

      - name: Import image to k3d
        run: |
          k3d image import security-monitor:latest -c devsecops

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace/namespace.yaml
          kubectl apply -f k8s/rbac/serviceaccount.yaml
          kubectl apply -f k8s/rbac/role.yaml
          kubectl apply -f k8s/rbac/rolebinding.yaml
          kubectl apply -f k8s/deployment/deployment.yaml
          kubectl apply -f k8s/service/service.yaml
          kubectl apply -f k8s/network-policy/network-policy.yaml
          kubectl get all -n security-monitor
